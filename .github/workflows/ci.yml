name: CI - 持续集成

on:
  push:
    branches: [ main, master, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [8, 11, 17]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: 设置 JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: 授予执行权限
      run: chmod +x mvnw
      working-directory: mybatis-main-dir
    
    - name: 编译项目
      run: ./mvnw clean compile
      working-directory: mybatis-main-dir
    
    - name: 运行单元测试
      run: ./mvnw test
      working-directory: mybatis-main-dir
    
    - name: 运行集成测试
      run: |
        cd mybatis-main-dir
        java -cp "target/classes:$(find ~/.m2/repository -name 'mybatis-*.jar' | grep -v 'mybatis-spring' | head -1):$(find ~/.m2/repository -name 'h2-*.jar' | head -1):$(find ~/.m2/repository -name 'ognl-*.jar' | head -1):$(find ~/.m2/repository -name 'javassist-*.jar' | head -1):$(find ~/.m2/repository -name 'slf4j-api-*.jar' | head -1)" com.zero.app.Application
    
    - name: 生成测试报告
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests - JDK ${{ matrix.java-version }}
        path: mybatis-main-dir/target/surefire-reports/*.xml
        reporter: java-junit
    
    - name: 上传测试结果
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results-jdk${{ matrix.java-version }}
        path: mybatis-main-dir/target/surefire-reports/
        retention-days: 7